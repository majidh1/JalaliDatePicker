<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<title>Test</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no,maximum-scale=1,user-scalable=no" />
		<script type="module" src="../src/index.js"></script>

		<link rel="stylesheet" href="/src/styles/index.scss" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous" />

		<style>
			body {
				font-family: vazir;
			}
		</style>
	</head>

	<body>
		<div class="container my-2 d-flex gap-3 flex-column">
			<div class="row">
				<div class="col d-flex flex-column gap-3">
					<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">Launch demo modal</button>
					<input data-jdp-target-value-input="#miladiDateSample" data-jdp placeholder="simple" class="form-control" value="1404/04/05 > 1404/04/10" />
					<input id="miladiDateSample" />
					<input type="text" data-jdp placeholder="لطفا یک تاریخ وارد نمایید" data-jdp-only-date class="form-control" />
					<input type="text" data-jdp data-jdp-min-date="today" placeholder="نمایش تاریخ از امروز" data-jdp-only-date class="form-control" />
					<input type="text" data-jdp data-jdp-max-date="today" placeholder="نمایش تاریخ تا امروز" data-jdp-only-date class="form-control" />
					<input type="text" data-jdp data-jdp-max-date="1400/05/10" placeholder="نمایش تاریخ تا 1400/05/10" data-jdp-only-date class="form-control" />
					<input type="text" data-jdp placeholder="انتخاب تاریخ و زمان" class="form-control" />
					<input type="text" data-jdp placeholder="امکان انتخاب فقط زمان" data-jdp-only-time class="form-control" />
				</div>
				<div class="col">
					<div class="bg-warning p-2 rounded">
						<select id="font-selector" class="form-select">
							<option>Samim</option>
							<option selected>Vazir</option>
							<option>Shabnam</option>
							<option>Tahoma</option>
							<option>B Shadi</option>
						</select>

						<div id="dynamic-settings" class="d-flex flex-column gap-2 mt-2">
							<h5>Dynamic Settings</h5>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="time" data-key="time" checked />
								<label class="form-check-label" for="time">Show Time Picker</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="date" data-key="date" checked />
								<label class="form-check-label" for="date">Show Date Picker</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="showTodayBtn" data-key="showTodayBtn" checked />
								<label class="form-check-label" for="showTodayBtn">Show Today Button</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="showEmptyBtn" data-key="showEmptyBtn" checked />
								<label class="form-check-label" for="showEmptyBtn">Show Empty Button</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="showCloseBtn" data-key="showCloseBtn" />
								<label class="form-check-label" for="showCloseBtn">Show Close Button</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="changeMonthRotateYear" data-key="changeMonthRotateYear" />
								<label class="form-check-label" for="changeMonthRotateYear">Change Month Rotates Year</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="useDropDownYears" data-key="useDropDownYears" />
								<label class="form-check-label" for="useDropDownYears">Use Dropdown for Years</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="persianDigits" data-key="persianDigits" />
								<label class="form-check-label" for="persianDigits">Use Persian Digits</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="autoShow" data-key="autoShow" />
								<label class="form-check-label" for="autoShow">Auto Show on Focus</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="autoHide" data-key="autoHide" checked />
								<label class="form-check-label" for="autoHide">Auto Hide on Select</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="hideAfterChange" data-key="hideAfterChange" />
								<label class="form-check-label" for="hideAfterChange">Hide After Change</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="autoReadOnlyInput" data-key="autoReadOnlyInput" />
								<label class="form-check-label" for="autoReadOnlyInput">Auto ReadOnly Input</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="hideAfterChangeWithTime" data-key="hideAfterChangeWithTime" checked />
								<label class="form-check-label" for="hideAfterChangeWithTime">Hide After Change With Time</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="showSelectTimeBtnAlways" data-key="showSelectTimeBtnAlways" />
								<label class="form-check-label" for="showSelectTimeBtnAlways">Show Select Time Button Always</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="hasSecond" data-key="hasSecond" checked />
								<label class="form-check-label" for="hasSecond">Has Second</label>
							</div>
							<div>
								<label for="zIndex" class="form-label">zIndex</label>
								<input class="form-control" type="number" id="zIndex" data-key="zIndex" value="9999" />
							</div>
							<div>
								<label for="topSpace" class="form-label">topSpace</label>
								<input class="form-control" type="number" id="topSpace" data-key="topSpace" value="0" />
							</div>
							<div>
								<label for="bottomSpace" class="form-label">bottomSpace</label>
								<input class="form-control" type="number" id="bottomSpace" data-key="bottomSpace" value="30" />
							</div>
							<div>
								<label for="overflowSpace" class="form-label">overflowSpace</label>
								<input class="form-control" type="number" id="overflowSpace" data-key="overflowSpace" value="-10" />
							</div>
							<div>
								<label for="minuteIncrement" class="form-label">minuteIncrement</label>
								<input class="form-control" type="number" id="minuteIncrement" data-key="minuteIncrement" value="1" />
							</div>
							<div>
								<label for="hourIncrement" class="form-label">hourIncrement</label>
								<input class="form-control" type="number" id="hourIncrement" data-key="hourIncrement" value="1" />
							</div>
							<div>
								<label for="position-selector" class="form-label">Position</label>
								<select id="position-selector" class="form-select" data-key="position">
									<option value="left">Left</option>
									<option value="right" selected>Right</option>
									<option value="center">Center</option>
								</select>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="modal fade" id="exampleModal" aria-modal="true" role="dialog" aria-hidden="true" data-bs-focus="false">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body" style="height: 60vh; overflow: auto">
						<div style="margin: 150vh 0">
							<input type="text" data-jdp data-jdp-max-date="1400/05/10" placeholder="نمایش تاریخ تا 1400/05/10" class="form-control" />
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
						<button type="button" class="btn btn-primary">Save changes</button>
					</div>
				</div>
			</div>
		</div>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				jalaliDatepicker.startWatch({
					minDate: "attr",
					maxDate: "attr",
					minTime: "attr",
					maxTime: "attr",
					time: true,
					date: true,
					hasSecond: true,
					hideAfterChangeWithTime: true,
					autoHide: true,
					showTodayBtn: true,
					showEmptyBtn: true,
					topSpace: 0,
					bottomSpace: 30,
					overflowSpace: -10,
					zIndex: 9999,
					position: "right",
					targetValueInput: "attr",
					targetValueType: "miladi",
					dayRendering(opt, input) {
						return {
							isHollyDay: opt.weekDay == 1
						};
					}
				});
				document.getElementById("font-selector").addEventListener("change", (event) => {
					document.body.style.fontFamily = event.target.value;
				});

				const settingsContainer = document.getElementById("dynamic-settings");
				const inputs = settingsContainer.querySelectorAll("input, select");

				const initialOptions = {
					time: true,
					date: true,
					showTodayBtn: true,
					showEmptyBtn: true,
					showCloseBtn: false,
					changeMonthRotateYear: false,
					useDropDownYears: false,
					persianDigits: false,
					autoShow: false,
					autoHide: true,
					hideAfterChange: false,
					autoReadOnlyInput: false,
					hideAfterChangeWithTime: true,
					showSelectTimeBtnAlways: false,
					hasSecond: true,
					zIndex: 9999,
					topSpace: 0,
					bottomSpace: 30,
					overflowSpace: -10,
					minuteIncrement: 1,
					hourIncrement: 1,
					position: "right"
				};

				inputs.forEach((input) => {
					const key = input.dataset.key;
					if (input.type === "checkbox") {
						input.checked = initialOptions[key];
					} else {
						input.value = initialOptions[key];
					}
				});

				settingsContainer.addEventListener("change", (event) => {
					const target = event.target;
					if (target.matches("input, select")) {
						const key = target.dataset.key;
						let value = target.value;
						if (target.type === "checkbox") {
							value = target.checked;
						} else if (target.type === "number") {
							value = Number(target.value);
						}
						jalaliDatepicker.updateOptions({ [key]: value });
					}
				});
			});
		</script>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"></script>
	</body>
</html>
