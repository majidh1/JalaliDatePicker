name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Use stable npm
        run: npm install -g npm@10.9.2

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci --include=dev --no-audit --no-fund --loglevel=notice

      - name: Verify test dependencies
        run: npm ls vitest --depth=0

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
